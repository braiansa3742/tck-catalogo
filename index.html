<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TCK Catálogo</title>

<style>
:root{
  --cream:#f6f3ef;
  --cream3:#ddd;
  --gold:#ffd200;
  --gold2:#ffb800;
}

/* BODY */
body,html{
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background:var(--cream);
}

/* CONTENEDOR SCROLL */
.body{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:0 0 calc(140px + env(safe-area-inset-bottom)) 0;
  -webkit-overflow-scrolling:touch;
  background:var(--cream);
}

.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:var(--cream3);border-radius:2px}

/* BARRA INFERIOR */
.orderbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  padding:10px 13px calc(20px + env(safe-area-inset-bottom));
  display:flex;
  gap:8px;
  min-height:80px;
  border-top:3px solid var(--gold);
  z-index:999;
}

/* BOTONES */
.btn-det{
  flex:1;
  background:#eee;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

.btn-wa{
  flex:2;
  background:#25D366;
  color:#fff;
  padding:12px;
  text-align:center;
  border-radius:8px;
  font-weight:bold;
}

/* FIX EXTRA IPHONE */
@supports (padding: max(0px)) {
  .body{
    padding-bottom:max(140px, calc(140px + env(safe-area-inset-bottom)));
  }

  .orderbar{
    padding-bottom:max(20px, calc(20px + env(safe-area-inset-bottom)));
  }
}

/* MOBILE */
@media (max-width:768px){
  .body{
    padding-bottom:160px;
  }

  .orderbar{
    min-height:86px;
    padding:12px 13px calc(24px + env(safe-area-inset-bottom));
  }

  .btn-det{
    padding:11px;
    font-size:14px;
  }

  .btn-wa{
    padding:14px;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="body">
  <!-- ACÁ VA TODO TU CATÁLOGO -->
  <div style="padding:20px;">
    <h2>Tu catálogo sigue igual acá</h2>
    <p>Productos, cards, etc...</p>
  </div>
</div>

<!-- BARRA INFERIOR -->
<div class="orderbar">
  <div class="btn-det">Ver pedido</div>
  <div class="btn-wa">Enviar a WhatsApp</div>
</div>

</body>
</html>
