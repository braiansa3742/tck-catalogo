<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TCK Pedidos</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TCK Pedidos">
<meta name="theme-color" content="#8B0000">
<link rel="apple-touch-icon" href="https://tckcatalogo.com/img/logo-tck.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── PALETA TCK ── */
:root {
  --red:    #8B0000;
  --red2:   #B71C1C;
  --gold:   #FFD700;
  --gold2:  #FFA500;
  --cream:  #FFF8F0;
  --cream2: #F5EDE0;
  --cream3: #E8D5BB;
  --text:   #1A0800;
  --text2:  #5C3A1E;
  --text3:  #9C7050;
  --green:  #1B5E20;
  --green2: #2E7D32;
  --green3: #E8F5E9;
  --orange: #E65100;
  --orange2:#FFF3E0;
  --blue:   #0D47A1;
  --blue2:  #E3F2FD;
  --border: rgba(139,0,0,.15);
  --shadow: 0 2px 12px rgba(139,0,0,.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: linear-gradient(135deg, #4A0000 0%, #8B0000 60%, #B71C1C 100%);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
.hdr-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 1px;
  text-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.hdr-sub {
  font-size: 10px;
  color: rgba(255,215,0,.65);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}
.hdr-fecha {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,.85);
  text-align: right;
  line-height: 1.4;
}

/* ── LOGIN ── */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 60px);
  padding: 24px;
  background: linear-gradient(160deg, var(--cream) 0%, var(--cream2) 100%);
}
.login-box {
  background: #fff;
  border-radius: 20px;
  padding: 36px 28px;
  width: 100%;
  max-width: 340px;
  box-shadow: 0 8px 32px rgba(139,0,0,.15);
  text-align: center;
  border: 1px solid var(--cream3);
}
.login-titulo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 28px;
}
.login-btn {
  width: 100%;
  background: var(--cream2);
  border: 2px solid var(--cream3);
  border-radius: 14px;
  padding: 13px 16px;
  margin-bottom: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: .3px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.login-btn:hover, .login-btn:active {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(139,0,0,.25);
}
.login-av {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--red);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 900;
  flex-shrink: 0;
}
.login-btn-name { flex: 1; text-align: left; }
.login-btn-role {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  font-family: 'Barlow', sans-serif;
  margin-top: 1px;
}

/* ── PANEL ── */
.panel { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
.panel.on { display: block; }

/* ── BIENVENIDA ── */
.bienvenida {
  background: linear-gradient(135deg, #4A0000 0%, #8B0000 60%, #B71C1C 100%);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 16px rgba(139,0,0,.2);
}
.bienvenida-nombre {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  letter-spacing: .5px;
}
.bienvenida-sub { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }
.btn-salir {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 8px;
  padding: 7px 16px;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  transition: background .15s;
}
.btn-salir:hover { background: rgba(255,255,255,.25); }

/* ── STATS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  background: #fff;
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
  border: 1.5px solid var(--cream3);
  box-shadow: var(--shadow);
}
.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px;
  font-weight: 900;
  color: var(--red);
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-top: 4px;
  font-weight: 600;
}

/* ── FILTROS ── */
.filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.filtro-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--cream3);
  background: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: .3px;
  transition: all .15s;
  touch-action: manipulation;
}
.filtro-btn.on {
  background: var(--red);
  color: var(--gold);
  border-color: var(--red);
}
.filtro-btn:hover:not(.on) { border-color: var(--red); color: var(--red); }

/* ── BUSCADOR ── */
.buscador-wrap { margin-bottom: 12px; position: relative; }
.buscador {
  width: 100%;
  padding: 11px 16px 11px 42px;
  border: 1.5px solid var(--cream3);
  border-radius: 12px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  background: #fff;
  color: var(--text);
  outline: none;
  box-shadow: var(--shadow);
}
.buscador:focus { border-color: var(--red); }
.buscador-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--text3);
}

/* ── CARDS PEDIDO ── */
.pedido-card {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid var(--cream3);
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow .15s, transform .15s;
  box-shadow: var(--shadow);
}
.pedido-card:hover { box-shadow: 0 4px 20px rgba(139,0,0,.12); }
.pedido-card.dup-exacto {
  border-color: #C62828;
  border-width: 2.5px;
  background: #FFF5F5;
}
.pedido-card.dup-exacto .pedido-cliente { color: #C62828; }
.pedido-card.dup-parcial {
  border-color: var(--orange);
  border-width: 2px;
  background: #FFFBF0;
}
.pedido-card.dup-parcial .pedido-cliente { color: var(--orange); }

.pedido-head {
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.pedido-head-left { flex: 1; min-width: 0; }
.pedido-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .8px;
  margin-bottom: 2px;
  text-transform: uppercase;
}
.pedido-cliente {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pedido-comercio {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pedido-head-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}
.pedido-total {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--red);
}
.pedido-hora { font-size: 11px; color: var(--text3); }

/* ── BADGES ── */
.badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .3px;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-pendiente { background: var(--orange2); color: var(--orange); }
.badge-confirmado { background: var(--green3); color: var(--green2); }
.badge-entregado { background: var(--blue2); color: var(--blue); }
.badge-cancelado { background: #FFEBEE; color: #C62828; }
.badge-dup-exacto { background: #C62828; color: #fff; animation: pulse 1s infinite; }
.badge-dup-parcial { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── DETALLE ── */
.pedido-body {
  display: none;
  border-top: 1.5px solid var(--cream2);
  padding: 14px 16px;
  background: var(--cream);
}
.pedido-body.on { display: block; }
.pedido-detalle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 6px 0;
  border-bottom: 1px solid var(--cream2);
  gap: 8px;
}
.pedido-detalle-row:last-child { border-bottom: none; }
.pdr-label {
  color: var(--text3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
}
.pdr-val { color: var(--text); font-weight: 500; text-align: right; }
.pedido-productos {
  background: #fff;
  border-radius: 10px;
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 12.5px;
  color: var(--text2);
  line-height: 1.9;
  border: 1.5px solid var(--cream3);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── ACCIONES ── */
.pedido-acciones { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn-estado {
  flex: 1;
  min-width: 110px;
  padding: 11px 12px;
  border-radius: 12px;
  border: 2px solid;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  letter-spacing: .3px;
  touch-action: manipulation;
}
.btn-confirmar { background: var(--green3); color: var(--green2); border-color: var(--green2); }
.btn-confirmar:hover { background: var(--green2); color: #fff; }
.btn-entregar { background: var(--blue2); color: var(--blue); border-color: var(--blue); }
.btn-entregar:hover { background: var(--blue); color: #fff; }
.btn-cancelar { background: #FFEBEE; color: #C62828; border-color: #C62828; }
.btn-cancelar:hover { background: #C62828; color: #fff; }
.btn-pendiente-again { background: var(--orange2); color: var(--orange); border-color: var(--orange); }
.btn-pendiente-again:hover { background: var(--orange); color: #fff; }

/* ── ALERTAS DUPLICADO ── */
.dup-alert-exacto {
  background: #FFEBEE;
  border: 2px solid #C62828;
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
}
.dup-alert-exacto-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 900;
  color: #C62828;
  margin-bottom: 4px;
}
.dup-alert-exacto-body { font-size: 13px; color: #B71C1C; }
.dup-alert-parcial {
  background: var(--orange2);
  border: 2px solid var(--orange);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
}
.dup-alert-parcial-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 900;
  color: var(--orange);
  margin-bottom: 4px;
}
.dup-alert-parcial-body { font-size: 13px; color: #BF360C; }

/* ── BOTONES REFRESH ── */
.btn-refresh {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 1.5px solid var(--cream3);
  border-radius: 12px;
  padding: 10px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all .15s;
}
.btn-refresh:hover { border-color: var(--red); color: var(--red); }

/* ── LOADING / EMPTY ── */
.loading, .empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text2);
  font-size: 14px;
}
.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--cream2);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  z-index: 9999;
  transition: transform .3s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
}
.toast.on { transform: translateX(-50%) translateY(0); }
.toast.ok { background: var(--green2); }
.toast.err { background: #C62828; }

/* ── PIN ── */
.pin-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--cream2);
  border: 2px solid var(--cream3);
  transition: all .15s;
}
.pin-dot.on { background: var(--red); border-color: var(--red); transform: scale(1.1); }
.pin-key {
  padding: 14px;
  border-radius: 14px;
  border: 1.5px solid var(--cream3);
  background: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: all .1s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(139,0,0,.07);
}
.pin-key:active { background: var(--cream2); transform: scale(.93); }
.pin-back { font-size: 13px; color: var(--text2); }
.pin-del { font-size: 18px; color: var(--red2); }

/* ── NOTAS ── */
.nota-wrap { margin-top: 12px; }
.nota-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--cream3);
  border-radius: 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: #fff;
  resize: none;
  outline: none;
  min-height: 60px;
}
.nota-input:focus { border-color: var(--gold2); }
.nota-guardada { font-size: 12px; color: var(--green2); margin-top: 4px; display: none; }

/* ── RANGO FECHAS ── */
input[type="date"] {
  font-family: 'Barlow', sans-serif;
  color: var(--text);
  background: #fff;
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">🐔 TCK Pedidos</div>
    <div class="hdr-sub">Panel de vendedores</div>
  </div>
  <div class="hdr-fecha" id="hdr-fecha"></div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-titulo">Ingresá</div>
    <div class="login-sub" id="login-sub">Seleccioná tu nombre</div>
    <div id="paso1">
      <button class="login-btn" onclick="seleccionarVendedor('Miguel','M','#8B0000')">
        <div class="login-av">M</div>
        <div class="login-btn-name">Miguel Martínez<div class="login-btn-role">Vendedor</div></div>
      </button>
      <button class="login-btn" onclick="seleccionarVendedor('Juan','J','#8B0000')">
        <div class="login-av">J</div>
        <div class="login-btn-name">Juan Cruz<div class="login-btn-role">Vendedor</div></div>
      </button>
      <button class="login-btn" onclick="seleccionarVendedor('Lisandro','L','#5C3A1E')">
        <div class="login-av" style="background:var(--text2);">L</div>
        <div class="login-btn-name">Lisandro<div class="login-btn-role">Vendedor</div></div>
      </button>
      <button class="login-btn" onclick="seleccionarVendedor('ADMIN','A','#B8860B')" style="margin-top:8px;border-color:var(--gold);background:var(--cream2);">
        <div class="login-av" style="background:var(--gold);color:var(--text);">A</div>
        <div class="login-btn-name">Administración<div class="login-btn-role">Ver todos los pedidos</div></div>
      </button>
    </div>
    <div id="paso2" style="display:none;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px 16px;background:var(--cream2);border-radius:12px;">
        <div id="pin-av" style="width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;flex-shrink:0;"></div>
        <div>
          <div id="pin-nombre" style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--text);"></div>
          <div style="font-size:12px;color:var(--text2);">Ingresá tu PIN</div>
        </div>
      </div>
      <div id="pin-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div id="pin-error" style="color:#C62828;font-size:13px;text-align:center;margin-bottom:12px;min-height:18px;"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key pin-back" onclick="pinVolver()">← Volver</button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key pin-del" onclick="pinBorrar()">⌫</button>
      </div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="bienvenida">
    <div>
      <div class="bienvenida-nombre" id="bienvenida-nombre"></div>
      <div class="bienvenida-sub" id="bienvenida-sub"></div>
    </div>
    <button class="btn-salir" onclick="salir()">Salir</button>
  </div>
  <div class="stats" style="grid-template-columns:repeat(2,1fr)">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Pedidos hoy</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-monto" style="font-size:22px">—</div>
      <div class="stat-label">Total del día</div>
    </div>
  </div>

function guardarSesion(nombre) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      vendedor: nombre,
      expira: Date.now() + SESSION_HORAS * 3600 * 1000
    }));
  } catch(e) {}
}

function recuperarSesion() {
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (Date.now() > data.expira) { localStorage.removeItem(SESSION_KEY); return null; }
    return data.vendedor;
  } catch(e) { return null; }
}

function limpiarSesion() {

let vendedorActual = null;
let todosLosPedidos = [];

setInterval(function() {

  const dupAntes = new Set(todosLosPedidos.filter(p => p.esDuplicado).map(p => p.pedidoId));
  cargarPedidos(true).then(function() {
    if (todosLosPedidos.length > antes) notificarNuevoPedido(todosLosPedidos.length - antes);
    const dupNuevos = todosLosPedidos.filter(p => p.esDuplicado && !dupAntes.has(p.pedidoId));
    if (dupNuevos.length > 0) notificarDuplicados(dupNuevos);
  });
}, 30000);

// ── SONIDOS ──────────────────────────────────────────────────────
function sonarTono(frecuencias, duracion) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    frecuencias.forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i*duracion);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*duracion + duracion);
      osc.start(ctx.currentTime + i*duracion);
      osc.stop(ctx.currentTime + i*duracion + duracion);
    });
  } catch(e) {}
}

function notificarNuevoPedido(cantidad) {
  sonarTono([800, 1000], 0.2);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  toast('🔔 ' + cantidad + ' pedido' + (cantidad > 1 ? 's' : '') + ' nuevo' + (cantidad > 1 ? 's' : '') + '!', 'ok');
}

function notificarDuplicados(dups) {
  const nuevos = dups.filter(p => !duplicadosNotificados.has(p.pedidoId));
  if (!nuevos.length) return;
  nuevos.forEach(p => duplicadosNotificados.add(p.pedidoId));
  sonarTono([1200, 800, 1200, 600], 0.15);
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
  toast('⚠️ ' + nuevos.length + ' duplicado' + (nuevos.length > 1 ? 's' : '') + ' detectado' + (nuevos.length > 1 ? 's' : '') + '!', 'err');
  setTimeout(function() {
    const hora = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    let msg = '⚠️ *TCK — Pedidos duplicados detectados*\n🕐 ' + hora + '\n\n';
    nuevos.forEach(function(p) {
      msg += '👤 *' + p.cliente + '*';
      if (p.comercio) msg += ' (' + p.comercio + ')';
      msg += '\n💰 ' + fmtTotal(p.total) + ' · ' + p.localidad;
      msg += '\n📋 ' + p.pedidoId;
      msg += '\n⚠️ También en: ' + (p.duplicadoCon || 'otro vendedor') + '\n\n';

}

    '<div style="display:flex;gap:8px;">' +
    '<button style="background:#fff;color:#C62828;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;" onclick="avisarAdmin()">📲 Avisar admin</button>' +

    '</div>';
}

// ── CARGAR PEDIDOS ───────────────────────────────────────────────
async function cargarPedidos(silencioso) {
  silencioso = silencioso || false;
  if (!silencioso) document.getElementById('lista-pedidos').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div>Cargando pedidos...</div>';
  try {
    var res = await fetch(SHEET_CSV + '&t=' + Date.now());
    var csv = await res.text();
    var lines = csv.trim().split('\n');
    var pedidos = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = parseCsv(lines[i]);
      if (!cols[0] || limpiar(cols[0]) === '') continue;
      pedidos.push({
        pedidoId:  limpiar(cols[0]),
        fechaHora: limpiar(cols[1]),
        vendedor:  limpiar(cols[2]),
        cliente:   limpiar(cols[3]),
        comercio:  limpiar(cols[4]),
        localidad: limpiar(cols[5]),
        total:     limpiar(cols[6]),
        items:     limpiar(cols[7]),
        resumen:   limpiar(cols[8]),
        detalle:   limpiar(cols[9]),
        estado:    limpiar(cols[10]) || 'Pendiente',
        fila:      i + 1
      });
    }
    pedidos.sort(function(a, b) { return b.fechaHora.localeCompare(a.fechaHora); });

    // Detectar duplicados — dos niveles
    var mapTotal = {}, mapCliente = {};
    pedidos.forEach(function(p) {
      var kT = (p.cliente + p.total).toLowerCase().replace(/\s/g,'');
      var kC = p.cliente.toLowerCase().trim();
      if (!mapTotal[kT]) mapTotal[kT] = [];
      if (!mapCliente[kC]) mapCliente[kC] = [];
      mapTotal[kT].push(p);
      mapCliente[kC].push(p);
    });
    pedidos.forEach(function(p) {
      var kT = (p.cliente + p.total).toLowerCase().replace(/\s/g,'');
      var kC = p.cliente.toLowerCase().trim();
      var gT = mapTotal[kT], gC = mapCliente[kC];
      if (gT.length > 1) {
        p.esDuplicado = true; p.tipoDuplicado = 'exacto';
        p.duplicadoCon = gT.filter(function(x){return x.pedidoId!==p.pedidoId;})
          .map(function(x){return x.vendedor||'otro vendedor';})
          .filter(function(v,i,a){return a.indexOf(v)===i;}).join(', ');
      } else if (gC.length > 1) {
        p.esDuplicado = true; p.tipoDuplicado = 'parcial';
        p.duplicadoCon = gC.filter(function(x){return x.pedidoId!==p.pedidoId;})
          .map(function(x){return x.vendedor||'otro vendedor';})
          .filter(function(v,i,a){return a.indexOf(v)===i;}).join(', ');
      } else {
        p.esDuplicado = false; p.tipoDuplicado = null; p.duplicadoCon = '';
      }
    });

    cargarNotas(pedidos);
    todosLosPedidos = pedidos;

    if (!silencioso) {
      var dups = pedidos.filter(function(p){return p.esDuplicado;});
      if (dups.length > 0) notificarDuplicados(dups);
    }
    actualizarStats();
    renderPedidos();
  } catch(e) {
    if (!silencioso) document.getElementById('lista-pedidos').innerHTML =
      '<div class="empty">❌ Error al cargar pedidos.<br>Verificá tu conexión.</div>';
  }
}

function limpiar(s) { return s ? s.trim().replace(/^"|"$/g,'').trim() : ''; }

function parseCsv(line) {
  var result = [], current = '', inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') {
      if (inQuotes && line[i+1]==='"') { current+='"'; i++; } else inQuotes=!inQuotes;
    } else if (c === ',' && !inQuotes) { result.push(current); current=''; }
    else current += c;
  }
  result.push(current);
  return result;
}

// ── STATS ─────────────────────────────────────────────────────────
function actualizarTitle() {
  var pend = todosLosPedidos.filter(function(p){
    return p.estado === 'Pendiente' && (vendedorActual === 'ADMIN' || p.vendedor.toLowerCase().includes(vendedorActual.toLowerCase()));
  }).length;
  if (pend > 0) {
    document.title = '⏳ ' + pend + ' — TCK Pedidos';
  } else {
    document.title = '✅ TCK Pedidos';
  }
}

function actualizarStats() {
  var mis = pedidosVisibles();
  var activos = mis.filter(function(p){return p.estado!=='Cancelado';});
  var total = activos.reduce(function(acc,p){
    var n = parseInt((p.total||'0').replace(/[^\d]/g,''));
    return acc + (isNaN(n)?0:n);
  }, 0);
  document.getElementById('stat-total').textContent = activos.length;
  document.getElementById('stat-monto').textContent = '$' + total.toLocaleString('es-AR');
  document.getElementById('stat-pend').textContent = mis.filter(function(p){return p.estado==='Pendiente';}).length;
  document.getElementById('stat-conf').textContent = mis.filter(function(p){return p.estado==='Confirmado';}).length;
  document.getElementById('stat-entregado').textContent = mis.filter(function(p){return p.estado==='Entregado';}).length;
}

function pedidosVisibles() {
  if (vendedorActual === 'ADMIN') return todosLosPedidos;
  return todosLosPedidos.filter(function(p){
    return p.vendedor.toLowerCase().includes(vendedorActual.toLowerCase());
  });
}

    var s = y+'-'+m+'-'+d;
    if (!document.getElementById('fecha-desde').value) document.getElementById('fecha-desde').value = s;
    if (!document.getElementById('fecha-hasta').value) document.getElementById('fecha-hasta').value = s;

function setFiltro(f, btn) {

  btn.classList.add('on'); filtrar();
}

function filtrar() { renderPedidos(); }

function fechaPedido(p) {
  var m = p.pedidoId.match(/TCK-(\d{4})(\d{2})(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  var d = new Date((p.fechaHora||'').replace(' ','T'));
  return isNaN(d.getTime()) ? new Date() : d;
}

function pedidosFiltrados() {
  var lista = pedidosVisibles();
  var q = document.getElementById('buscador').value.toLowerCase();
  var hoy = new Date(); hoy.setHours(0,0,0,0);

  if (filtroFecha === 'hoy') {
    lista = lista.filter(function(p){ var f=fechaPedido(p); f.setHours(0,0,0,0); return f.getTime()===hoy.getTime(); });
  } else if (filtroFecha === 'ayer') {
    var ayer = new Date(hoy); ayer.setDate(ayer.getDate()-1);
    lista = lista.filter(function(p){ var f=fechaPedido(p); f.setHours(0,0,0,0); return f.getTime()===ayer.getTime(); });
  } else if (filtroFecha === 'semana') {
    var sem = new Date(hoy); sem.setDate(sem.getDate()-7);
    lista = lista.filter(function(p){ return fechaPedido(p) >= sem; });
  } else if (filtroFecha === 'personalizado') {
    var ds = document.getElementById('fecha-desde').value;
    var hs = document.getElementById('fecha-hasta').value;
    if (ds) { var desde = new Date(ds+'T00:00:00'); lista = lista.filter(function(p){return fechaPedido(p)>=desde;}); }
    if (hs) { var hasta = new Date(hs+'T23:59:59'); lista = lista.filter(function(p){return fechaPedido(p)<=hasta;}); }
  }

  if (vendedorActual === 'ADMIN' && filtroVendedor !== 'todos')
    lista = lista.filter(function(p){ return p.vendedor.toLowerCase().includes(filtroVendedor.toLowerCase()); });

  if (filtroActual === 'duplicado') lista = lista.filter(function(p){return p.esDuplicado;});
  else if (filtroActual !== 'todos') lista = lista.filter(function(p){return p.estado===filtroActual;});

  if (q) lista = lista.filter(function(p){
    return p.cliente.toLowerCase().includes(q) || p.comercio.toLowerCase().includes(q) ||
           p.localidad.toLowerCase().includes(q) || p.pedidoId.toLowerCase().includes(q);
  });
  return lista;
}

// ── RENDER ────────────────────────────────────────────────────────
function renderPedidos() {
  actualizarStats();
  actualizarTitle();
  var lista = pedidosFiltrados();
  var cont = document.getElementById('lista-pedidos');
  if (!lista.length) { cont.innerHTML = '<div class="empty">📭 No hay pedidos para mostrar</div>'; return; }
  cont.innerHTML = lista.map(function(p){ return renderCard(p); }).join('');
}

function fmtTotal(t) {
  var n = parseInt((t||'').replace(/[^\d]/g,''));
  return isNaN(n) ? (t||'') : '$' + n.toLocaleString('es-AR');
}

function badgeHtml(p) {
  var bs = {
    'Pendiente': '<span class="badge badge-pendiente">⏳ Pendiente</span>',
    'Confirmado': '<span class="badge badge-confirmado">✅ Confirmado</span>',
    'Entregado':  '<span class="badge badge-entregado">📦 Entregado</span>',
    'Cancelado':  '<span class="badge badge-cancelado">❌ Cancelado</span>'
  };
  var b = bs[p.estado] || '<span class="badge badge-pendiente">' + p.estado + '</span>';
  if (p.esDuplicado && p.tipoDuplicado === 'exacto') b += ' <span class="badge badge-dup-exacto">🔴 DUPLICADO</span>';
  else if (p.esDuplicado) b += ' <span class="badge badge-dup-parcial">🟠 PEDIDO DOBLE</span>';
  return b;
}

function renderCard(p) {
  var id = p.pedidoId.replace(/[^a-zA-Z0-9]/g,'-');
  var esAdmin = vendedorActual === 'ADMIN';
  var claseCard = p.tipoDuplicado === 'exacto' ? ' dup-exacto' : p.esDuplicado ? ' dup-parcial' : '';

  var dupAlert = '';
  if (p.tipoDuplicado === 'exacto') {
    dupAlert = '<div class="dup-alert-exacto">' +
      '<div class="dup-alert-exacto-title">🔴 PEDIDO DUPLICADO EXACTO</div>' +
      '<div class="dup-alert-exacto-body">Este mismo pedido también lo tiene <strong>' + (p.duplicadoCon||'otro vendedor') + '</strong>. Uno debe cancelar antes de remitir.</div>' +
      '</div>';
  } else if (p.tipoDuplicado === 'parcial') {
    dupAlert = '<div class="dup-alert-parcial">' +
      '<div class="dup-alert-parcial-title">🟠 CLIENTE CON PEDIDO DOBLE</div>' +
      '<div class="dup-alert-parcial-body"><strong>' + p.cliente + '</strong> tiene otro pedido con <strong>' + (p.duplicadoCon||'otro vendedor') + '</strong> por monto diferente. Verificar manualmente.</div>' +
      '</div>';
  }

  var btns = '';
  if (p.estado !== 'Confirmado') btns += '<button class="btn-estado btn-confirmar" onclick="cambiarEstado(\'' + p.pedidoId + '\',' + p.fila + ',\'Confirmado\',event)">✅ Confirmar</button>';
  if (p.estado !== 'Entregado')  btns += '<button class="btn-estado btn-entregar" onclick="cambiarEstado(\'' + p.pedidoId + '\',' + p.fila + ',\'Entregado\',event)">📦 Entregado</button>';
  if (esAdmin && p.estado !== 'Pendiente') btns += '<button class="btn-estado btn-pendiente-again" onclick="cambiarEstado(\'' + p.pedidoId + '\',' + p.fila + ',\'Pendiente\',event)">⏳ Pendiente</button>';
  if (esAdmin && p.estado !== 'Cancelado') btns += '<button class="btn-estado btn-cancelar" onclick="confirmarCancelar(\'' + p.pedidoId + '\',' + p.fila + ',event)">❌ Cancelar</button>';

  var vendedorRow = esAdmin ? '<div class="pedido-detalle-row"><span class="pdr-label">Vendedor</span><span class="pdr-val">' + p.vendedor + '</span></div>' : '';
  var detalle = p.detalle ? p.detalle.replace(/\|/g,'\n').replace(/ · /g,' — ') : (p.resumen || '');
  var hora = (p.fechaHora||'').split(' ')[1] || (p.fechaHora||'').split('T')[1] || '';

  return '<div class="pedido-card' + claseCard + '" id="card-' + id + '">' +
    '<div class="pedido-head" onclick="toggleCard(\'' + id + '\')">' +
      '<div class="pedido-head-left">' +
        '<div class="pedido-id">' + p.pedidoId + '</div>' +
        '<div class="pedido-cliente">' + (p.cliente||'(sin nombre)') + '</div>' +
        '<div class="pedido-comercio">' + (p.comercio ? '🏪 '+p.comercio+' · ' : '') + '📍 ' + p.localidad + '</div>' +
      '</div>' +
      '<div class="pedido-head-right">' +
        '<div class="pedido-total">' + fmtTotal(p.total) + '</div>' +
        badgeHtml(p) +
        '<div class="pedido-hora">' + hora + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="pedido-body" id="body-' + id + '">' +
      vendedorRow +
      '<div class="pedido-detalle-row"><span class="pdr-label">Localidad</span><span class="pdr-val">' + p.localidad + '</span></div>' +
      '<div class="pedido-detalle-row"><span class="pdr-label">Productos</span><span class="pdr-val">' + p.items + ' unidades</span></div>' +
      '<div class="pedido-detalle-row"><span class="pdr-label">Total</span><span class="pdr-val" style="color:var(--red);font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:900;">' + fmtTotal(p.total) + '</span></div>' +
      '<div class="pedido-detalle-row"><span class="pdr-label">Fecha/Hora</span><span class="pdr-val">' + p.fechaHora + '</span></div>' +
      (detalle ? '<div class="pedido-productos">' + detalle + '</div>' : '') +
      dupAlert +
      '<div class="pedido-acciones">' + btns + '</div>' +
      '<div class="nota-wrap">' +
        '<textarea class="nota-input" id="nota-' + id + '" placeholder="📝 Nota interna..." onblur="guardarNota(\'' + p.pedidoId + '\')">' + (p.nota||'') + '</textarea>' +
        '<div class="nota-guardada" id="nota-ok-' + id + '">✅ Nota guardada</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleCard(id) {
  var b = document.getElementById('body-'+id);
  if (b) b.classList.toggle('on');
}

// ── NOTAS ─────────────────────────────────────────────────────────
function guardarNota(pedidoId) {
  var id = pedidoId.replace(/[^a-zA-Z0-9]/g,'-');
  var el = document.getElementById('nota-'+id);
  if (!el) return;
  try {
    localStorage.setItem('tck_nota_'+pedidoId, el.value.trim());
    var ok = document.getElementById('nota-ok-'+id);
    if (ok) { ok.style.display='block'; setTimeout(function(){ok.style.display='none';},2000); }
    var p = todosLosPedidos.find(function(x){return x.pedidoId===pedidoId;});
    if (p) p.nota = el.value.trim();
  } catch(e) {}
}

function cargarNotas(pedidos) {
  pedidos.forEach(function(p) {
    try { p.nota = localStorage.getItem('tck_nota_'+p.pedidoId)||''; } catch(e) { p.nota=''; }
  });
}

// ── EXPORTAR ──────────────────────────────────────────────────────
function exportarResumen() {
  var lista = pedidosFiltrados();
  if (!lista.length) { toast('No hay pedidos para exportar',''); return; }
  var nombre = vendedorActual==='ADMIN' ? 'Todos los vendedores' : vendedorActual;
  var activos = lista.filter(function(p){return p.estado!=='Cancelado';});
  var total = activos.reduce(function(acc,p){return acc+(parseInt((p.total||'').replace(/[^\d]/g,''))||0);},0);
  var pend = activos.filter(function(p){return p.estado==='Pendiente';});
  var conf = activos.filter(function(p){return p.estado==='Confirmado';});
  var entr = activos.filter(function(p){return p.estado==='Entregado';});
  var canc = lista.filter(function(p){return p.estado==='Cancelado';});
  var hoy = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  var msg = '🐔 *TCK — Resumen de pedidos*\n📅 '+hoy+'\n👤 '+nombre+'\n━━━━━━━━━━━━━━━\n\n';
  msg += '📦 *Total:* '+activos.length+'\n💰 *Monto:* $'+total.toLocaleString('es-AR')+'\n\n';
  msg += '⏳ Pendientes: '+pend.length+'\n✅ Confirmados: '+conf.length+'\n📦 Entregados: '+entr.length+'\n';
  if (canc.length) msg += '❌ Cancelados: '+canc.length+'\n';
  msg += '\n━━━━━━━━━━━━━━━\n*Detalle:*\n';
  activos.forEach(function(p){
    var ic = p.estado==='Confirmado'?'✅':p.estado==='Entregado'?'📦':'⏳';
    msg += ic+' '+p.cliente+(p.comercio?' ('+p.comercio+')':'')+' — '+fmtTotal(p.total)+' · '+p.localidad+'\n';
  });
  msg += '\n_Generado desde TCK Pedidos_';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// ── CAMBIAR ESTADO ────────────────────────────────────────────────
function confirmarCancelar(pedidoId, fila, event) {
  event.stopPropagation();
  if (confirm('⚠️ ¿Seguro que querés cancelar este pedido?\nEsta acción quedará registrada.')) {
    cambiarEstado(pedidoId, fila, 'Cancelado', event);
  }
}

async function cambiarEstado(pedidoId, fila, nuevoEstado, event) {
  event.stopPropagation();
  var btn = event.target;
  var txtOrig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    var params = new URLSearchParams({accion:'cambiarEstado', pedidoId:pedidoId, fila:fila, estado:nuevoEstado});
    await fetch(APPS_SCRIPT_URL+'?'+params.toString(), {mode:'no-cors'});
    var p = todosLosPedidos.find(function(x){return x.pedidoId===pedidoId;});
    if (p) p.estado = nuevoEstado;
    renderPedidos();
    toast('Estado: '+nuevoEstado, 'ok');
  } catch(e) {
    btn.disabled=false; btn.textContent=txtOrig;
    toast('Error al guardar','err');
  }
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, tipo) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast on '+(tipo||'');
  setTimeout(function(){el.classList.remove('on');},2500);
}
</script>
