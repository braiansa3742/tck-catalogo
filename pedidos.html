<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso no autorizado — TCK</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #4A0000 0%, #8B0000 60%, #B71C1C 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    width: 80px;
    margin-bottom: 16px;
  }
  .icono {
    font-size: 56px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 26px;
    font-weight: 900;
    color: #8B0000;
    margin-bottom: 8px;
    letter-spacing: .5px;
  }
  p {
    font-size: 15px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 28px;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }
  .divider {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: .5px;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 10px;
    transition: transform .12s, box-shadow .12s;
  }
  .btn:active { transform: scale(.97); }
  .btn-ventas {
    background: linear-gradient(135deg, #2E7D32, #1B5E20);
    color: #fff;
    box-shadow: 0 4px 16px rgba(46,125,50,.35);
  }
  .btn-admin {
    background: linear-gradient(135deg, #B8860B, #8B6914);
    color: #fff;
    box-shadow: 0 4px 16px rgba(184,134,11,.35);
  }
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #bbb;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <img src="https://tckcatalogo.com/img/logo.png" alt="TCK" class="logo" onerror="this.style.display='none'">
  <div class="icono">🔒</div>
  <h1>Acceso no autorizado</h1>
  <p>Esta dirección ya no está disponible. Por favor usá el link que te corresponde.</p>
  <div class="divider">Accedé desde tu link oficial</div>
  <a href="https://tckventas.com" class="btn btn-ventas">🐔 Soy vendedor — TCK Ventas</a>
  <a href="https://tckadmin.lat" class="btn btn-admin">👑 Soy administrador — TCK Admin</a>
  <div class="footer">TCK Distribuidora · The Chicken Kings</div>
</div>
</body>
</html>
